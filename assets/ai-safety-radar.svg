  <path d="M 100 12 L 180 40 L 180 100 C 180 144 146 178 100 192 C 54 178 20 144 20 100 L 20 40 Z" fill="#ffffff" stroke="#0b6aa8" stroke-width="10" stroke-linejoin="round"/>

